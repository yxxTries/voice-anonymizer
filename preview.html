<!DOCTYPE html>
<html>
<head>
  <title>Voice Anonymizer - Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Aptos', 'Trebuchet MS', 'Segoe UI', sans-serif;
      background:
        radial-gradient(circle at 18% -22%, rgba(55, 55, 55, 0.35), transparent 42%),
        radial-gradient(circle at 86% 8%, rgba(42, 42, 42, 0.3), transparent 35%),
        linear-gradient(160deg, #050505, #0c0c0c 48%, #070707);
      color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 18px;
    }
    .card {
      background: rgba(14, 14, 14, 0.9);
      border: 1px solid rgba(60, 60, 60, 0.7);
      border-radius: 10px;
      padding: 24px;
      text-align: left;
      max-width: 620px;
      width: 100%;
      box-shadow: 0 20px 52px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(6px);
    }
    h1 {
      color: #f5f5f5;
      margin-bottom: 6px;
      font-size: 24px;
      letter-spacing: 0.15px;
      line-height: 1.25;
      text-align: center;
    }
    .sub {
      color: #ababab;
      font-size: 13px;
      margin-bottom: 16px;
      text-align: center;
      line-height: 1.35;
    }
    .voice-picker {
      background: #141414;
      border: 1px solid #323232;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 12px;
    }
    .voice-picker label {
      display: block;
      margin-bottom: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: #cccccc;
    }
    .voice-picker select {
      width: 100%;
      border-radius: 6px;
      border: 1px solid #393939;
      background: #0c0c0c;
      color: #f0f0f0;
      font-size: 13px;
      padding: 8px 10px;
    }
    .voice-picker select:focus {
      outline: none;
      border-color: #6a6a6a;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.14);
    }
    .voice-hint {
      margin-top: 6px;
      font-size: 11px;
      color: #9e9e9e;
      line-height: 1.35;
    }
    .status {
      font-size: 14px;
      font-weight: 700;
      margin: 12px 0;
      padding: 10px 16px;
      border-radius: 6px;
      text-align: center;
    }
    .status.ready {
      background: rgba(255, 255, 255, 0.08);
      color: #e9e9e9;
    }
    .status.recording {
      background: rgba(255, 255, 255, 0.12);
      color: #f1f1f1;
      animation: pulse 1s infinite;
    }
    .status.done {
      background: rgba(255, 255, 255, 0.1);
      color: #e7e7e7;
    }
    .status.error {
      background: rgba(255, 255, 255, 0.12);
      color: #f3f3f3;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .meters { margin: 12px 0; }
    .meter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      justify-content: center;
    }
    .meter-label { font-size: 11px; width: 72px; text-align: right; color: #a8a8a8; }
    .meter-bar {
      width: min(100%, 390px);
      height: 8px;
      background: #242424;
      border-radius: 4px; overflow: hidden;
    }
    .meter-fill { height: 100%; width: 0%; border-radius: 4px; transition: width 0.1s; }
    .meter-fill.input { background: linear-gradient(90deg, #8a8a8a, #ececec); }

    .timer {
      font-size: 28px;
      font-weight: 700;
      color: #f3f3f3;
      margin: 12px 0;
      font-variant-numeric: tabular-nums;
      text-align: center;
    }

    .buttons {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 14px 0;
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    .btn.record { background: linear-gradient(90deg, #3c3c3c, #575757); color: #f1f1f1; }
    .btn.record:hover:not(:disabled) { filter: brightness(1.04); }
    .btn.stop { background: #3f3f3f; color: white; }
    .btn.play { background: linear-gradient(90deg, #d9d9d9, #f0f0f0); color: #0f0f0f; }
    .btn.play:hover:not(:disabled) { filter: brightness(1.03); }
    .btn.close { background: #1c1c1c; color: #d9d9d9; border: 1px solid #343434; }
    .btn.close:hover { background: #272727; }

    .playback-section {
      display: none;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #303030;
    }
    .playback-section.visible { display: block; }
    .playback-label {
      font-size: 11px;
      color: #bebebe;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      text-align: center;
    }
    .playback-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }
    .btn.small {
      padding: 7px 16px;
      font-size: 12px;
    }
    .btn.original { background: #212121; color: #dfdfdf; border: 1px solid #353535; }
    .btn.original:hover:not(:disabled) { background: #2a2a2a; }
    .btn.disguised { background: linear-gradient(90deg, #d9d9d9, #f1f1f1); color: #111111; }
    .btn.disguised:hover:not(:disabled) { filter: brightness(1.03); }
    .btn.playing { outline: 2px solid #fff; outline-offset: 2px; }

    .tip {
      color: #8f8f8f;
      font-size: 10px;
      margin-top: 12px;
      text-align: center;
      line-height: 1.35;
    }

    @media (max-width: 680px) {
      .card {
        padding: 18px 14px;
      }
      h1 {
        font-size: 22px;
      }
      .buttons {
        gap: 6px;
      }
      .btn {
        flex: 1;
        min-width: 110px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Voice Preview</h1>
    <p class="sub">Record a short clip and compare your original audio against the anonymized version.</p>

    <div class="voice-picker">
      <label for="previewVoiceType">Preview Voice Type</label>
      <select id="previewVoiceType">
        <option value="balanced" selected>Balanced Clear (Default)</option>
        <option value="warm">Warm Narrator</option>
        <option value="bright">Bright Guide</option>
        <option value="synthetic">Synthetic Neutral</option>
        <option value="custom">Use Custom Slider Settings</option>
      </select>
      <p id="voiceHint" class="voice-hint">Natural cadence with clear consonants and anonymized timbre.</p>
    </div>

    <div id="statusBox" class="status ready">Ready to record.</div>

    <div class="timer" id="timer">0:00</div>

    <div class="meters">
      <div class="meter-row">
        <span class="meter-label">Mic level</span>
        <div class="meter-bar"><div id="inMeter" class="meter-fill input"></div></div>
      </div>
    </div>

    <div class="buttons">
      <button class="btn record" id="recordBtn">Record</button>
      <button class="btn stop" id="stopBtn" disabled>Stop</button>
    </div>

    <div class="playback-section" id="playbackSection">
      <p class="playback-label">Listen to your recording</p>
      <div class="playback-row">
        <button class="btn small original" id="playOriginalBtn">Play Original</button>
        <button class="btn small disguised" id="playDisguisedBtn">Play Anonymized</button>
      </div>
    </div>

    <div class="buttons">
      <button class="btn close" id="closeBtn">Close</button>
    </div>

    <p class="tip">You can record multiple times. Each new recording replaces the last.</p>
  </div>
  <script src="preview.js"></script>
</body>
</html>
