<!DOCTYPE html>
<html>
<head>
  <title>Voice Anonymizer — Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #16213e;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      max-width: 500px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h1 { color: #00d2ff; margin-bottom: 8px; font-size: 24px; }
    .sub { color: #888; font-size: 13px; margin-bottom: 24px; }
    .status {
      font-size: 18px;
      font-weight: 700;
      margin: 20px 0;
      padding: 12px 24px;
      border-radius: 8px;
    }
    .status.listening {
      background: rgba(0, 210, 255, 0.15);
      color: #00d2ff;
    }
    .status.error {
      background: rgba(255, 71, 87, 0.15);
      color: #ff4757;
    }
    .meters { margin: 20px 0; }
    .meter-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px; justify-content: center;
    }
    .meter-label { font-size: 12px; width: 50px; text-align: right; color: #888; }
    .meter-bar {
      width: 300px; height: 10px; background: #222;
      border-radius: 5px; overflow: hidden;
    }
    .meter-fill { height: 100%; width: 0%; border-radius: 5px; transition: width 0.1s; }
    .meter-fill.input { background: linear-gradient(90deg, #00d2ff, #00ff88); }
    .meter-fill.output { background: linear-gradient(90deg, #ff6b6b, #ffa502); }
    .tip { color: #555; font-size: 11px; margin-top: 16px; }
    .stopbtn {
      margin-top: 20px; padding: 10px 32px; border: none;
      border-radius: 8px; background: #ff4757; color: white;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .stopbtn:hover { background: #ee3344; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎙️ Voice Preview</h1>
    <p class="sub">Speak into your mic — you'll hear your anonymized voice</p>
    <div id="statusBox" class="status listening">⏳ Starting...</div>
    <div class="meters">
      <div class="meter-row">
        <span class="meter-label">Your voice</span>
        <div class="meter-bar"><div id="inMeter" class="meter-fill input"></div></div>
      </div>
      <div class="meter-row">
        <span class="meter-label">Disguised</span>
        <div class="meter-bar"><div id="outMeter" class="meter-fill output"></div></div>
      </div>
    </div>
    <p class="tip">🎧 Use headphones to avoid echo feedback</p>
    <button class="stopbtn" id="stopBtn">⏹ Stop & Close</button>
  </div>
  <script src="preview.js"></script>
</body>
</html>
