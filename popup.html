<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Voice Anonymizer</h1>
    <p class="subtitle">Clear speech, stronger identity masking.</p>

    <!-- Master Toggle -->
    <div class="toggle-row">
      <span class="toggle-label">Anonymizer</span>
      <label class="switch">
        <input type="checkbox" id="enableToggle" checked>
        <span class="slider"></span>
      </label>
      <span id="statusLabel" class="status on">ACTIVE</span>
    </div>

    <!-- Voice Style Dropdown -->
    <div class="control-group">
      <label>Voice Style</label>
      <select id="voiceStyle">
        <option value="balanced" selected>Balanced Clear (Default)</option>
        <option value="warm">Warm Narrator</option>
        <option value="bright">Bright Guide</option>
        <option value="synthetic">Synthetic Neutral</option>
        <option value="custom">Custom (Advanced)</option>
      </select>
      <p id="voiceDescription" class="voice-description">Natural cadence with clear consonants and anonymized timbre.</p>
    </div>

    <div class="control-group">
      <label>Mic Input Volume: <span id="micGainValue">100%</span></label>
      <input type="range" id="micGainSlider" min="0" max="2" step="0.01" value="1">
      <div class="range-labels"><span>Mute</span><span>Boost</span></div>
    </div>

    <!-- Advanced Settings (hidden by default) -->
    <div id="advancedPanel" class="advanced-panel hidden">
      <div class="advanced-header">Advanced Settings</div>

      <div class="control-group">
        <label>Pitch Shift: <span id="pitchValue">1.08x</span></label>
        <input type="range" id="pitchSlider" min="0.5" max="2.0" step="0.01" value="1.08">
        <div class="range-labels"><span>Lower</span><span>Higher</span></div>
      </div>

      <div class="control-group">
        <label>Formant Shift: <span id="formantValue">1.18x</span></label>
        <input type="range" id="formantSlider" min="0.5" max="2.0" step="0.01" value="1.18">
        <div class="range-labels"><span>Darker</span><span>Brighter</span></div>
      </div>

      <div class="control-group">
        <label>Noise Level: <span id="noiseValue">0.001</span></label>
        <input type="range" id="noiseSlider" min="0" max="0.05" step="0.001" value="0.001">
        <div class="range-labels"><span>None</span><span>Heavy</span></div>
      </div>

      <div class="control-group">
        <label>Tremolo Rate: <span id="tremoloRateValue">0 Hz</span></label>
        <input type="range" id="tremoloRateSlider" min="0" max="15" step="0.5" value="0">
      </div>

      <div class="control-group">
        <label>Tremolo Depth: <span id="tremoloDepthValue">0%</span></label>
        <input type="range" id="tremoloDepthSlider" min="0" max="0.5" step="0.01" value="0">
      </div>
    </div>

    <!-- Preview Button -->
    <div class="button-row">
      <button id="previewBtn" class="btn primary full">Open Voice Preview</button>
    </div>

    <p class="info">When enabled, microphone audio is anonymized automatically on all sites.</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
