<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>🎙️ Voice Anonymizer</h1>
    <p class="subtitle">Disguise your voice from humans. Stay clear to AI.</p>

    <!-- Master Toggle -->
    <div class="toggle-row">
      <label class="switch">
        <input type="checkbox" id="enableToggle" checked>
        <span class="slider"></span>
      </label>
      <span id="statusLabel" class="status on">ACTIVE</span>
    </div>

    <!-- Voice Style Dropdown -->
    <div class="control-group">
      <label>Voice Style</label>
      <select id="voiceStyle">
        <option value="natural1" selected>Person A — Deeper Natural</option>
        <option value="natural2">Person B — Higher Natural</option>
        <option value="natural3">Person C — Warm Tone</option>
        <option value="natural4">Person D — Bright Tone</option>
        <option value="custom">Custom (Advanced)</option>
      </select>
    </div>

    <!-- Advanced Settings (hidden by default) -->
    <div id="advancedPanel" class="advanced-panel hidden">
      <div class="advanced-header">Advanced Settings</div>

      <div class="control-group">
        <label>Pitch Shift: <span id="pitchValue">0.82x</span></label>
        <input type="range" id="pitchSlider" min="0.5" max="2.0" step="0.01" value="0.82">
        <div class="range-labels"><span>Lower</span><span>Higher</span></div>
      </div>

      <div class="control-group">
        <label>Formant Shift: <span id="formantValue">0.88x</span></label>
        <input type="range" id="formantSlider" min="0.5" max="2.0" step="0.01" value="0.88">
        <div class="range-labels"><span>Darker</span><span>Brighter</span></div>
      </div>

      <div class="control-group">
        <label>Noise Level: <span id="noiseValue">0.003</span></label>
        <input type="range" id="noiseSlider" min="0" max="0.05" step="0.001" value="0.003">
        <div class="range-labels"><span>None</span><span>Heavy</span></div>
      </div>

      <div class="control-group">
        <label>Tremolo Rate: <span id="tremoloRateValue">0 Hz</span></label>
        <input type="range" id="tremoloRateSlider" min="0" max="15" step="0.5" value="0">
      </div>

      <div class="control-group">
        <label>Tremolo Depth: <span id="tremoloDepthValue">0%</span></label>
        <input type="range" id="tremoloDepthSlider" min="0" max="0.5" step="0.01" value="0">
      </div>
    </div>

    <!-- Preview Button -->
    <div class="button-row">
      <button id="previewBtn" class="btn primary full">🎧 Preview My Voice</button>
    </div>

    <!-- Audio Level Meters -->
    <div class="meters">
      <div class="meter-row">
        <span class="meter-label">Input</span>
        <div class="meter-bar"><div id="inputMeter" class="meter-fill input"></div></div>
      </div>
      <div class="meter-row">
        <span class="meter-label">Output</span>
        <div class="meter-bar"><div id="outputMeter" class="meter-fill output"></div></div>
      </div>
    </div>

    <p class="info">
      ℹ️ Once enabled, all mic audio on every site is anonymized automatically.
    </p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
